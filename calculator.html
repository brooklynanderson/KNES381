<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training Load Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.5;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: 600;
    }

    input {
      width: 100%;
      max-width: 250px;
      padding: 8px;
      margin-top: 4px;
      font-size: 16px;
    }

    button {
      margin-top: 18px;
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      padding: 14px;
      border-radius: 8px;
      background: #f6f6f6;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Interactive Training Load Calculator</h1>
    <p>
      Enter session duration and RPE to calculate training load and classify the session.
    </p>

    <label for="duration">Duration (min)</label>
    <input id="duration" type="number" min="0" placeholder="e.g. 60" />

    <label for="rpe">RPE (1-10)</label>
    <input id="rpe" type="number" min="1" max="10" placeholder="e.g. 7" />

    <button type="button" onclick="calculateLoad()">Calculate</button>

    <div id="result" class="result">
      Training Load: —<br />
      Load Category: —
    </div>
  </div>

  <script>
    function calculateLoad() {
      const duration = Number(document.getElementById("duration").value);
      const rpe = Number(document.getElementById("rpe").value);
      const result = document.getElementById("result");

      if (!duration || !rpe || rpe < 1 || rpe > 10) {
        result.innerHTML =
          "Please enter a valid duration and an RPE between 1 and 10.";
        return;
      }

      const load = duration * rpe;
      let category = "";

      if (load < 300) {
        category = "Low";
      } else if (load <= 600) {
        category = "Moderate";
      } else {
        category = "High";
      }

      result.innerHTML =
        "Training Load: " + load + " AU<br />" +
        "Load Category: " + category;
    }
  </script>
</body>
</html>
